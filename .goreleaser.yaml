version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: minisql
    main: ./cmd/minisql
    binary: minisql
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # skip arm64 on Windows — no native runner and very rare in practice.
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: minisql
    ids: [minisql]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - name: minisql
    ids: [minisql]
    repository:
      owner: RichardKnop
      name: homebrew-minisql
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update minisql formula to {{ .Tag }}"
    homepage: "https://github.com/RichardKnop/minisql"
    description: "Embedded single-file SQL database in pure Go — faster than SQLite on latency benchmarks."
    license: "Apache-2.0"
    install: |
      bin.install "minisql"
    test: |
      system "#{bin}/minisql", "-version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: RichardKnop
    name: minisql
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
