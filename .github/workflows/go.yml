# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        go-version: ["1.26.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Test with coverage
        shell: bash
        run: |
          set -o pipefail
          LOG_LEVEL=info go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic 2>&1 | tee test-output.txt

      - name: Check coverage threshold
        id: coverage
        shell: bash
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $NF}' | tr -d '%')
          THRESHOLD=70
          if [ -z "${TOTAL}" ]; then
            echo "❌ Could not extract total coverage from coverage.out"
            exit 1
          fi
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "threshold=${THRESHOLD}" >> "$GITHUB_OUTPUT"
          if echo "${TOTAL} ${THRESHOLD}" | awk '{exit !($1 + 0 < $2 + 0)}'; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "❌ Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "✅ Coverage ${TOTAL}% meets threshold ${THRESHOLD}%"
          fi

      - name: Post coverage comment on PR
        if: ${{ !cancelled() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Resolve PR number for both pull_request and push events.
            let prNumber;
            if (context.eventName === 'pull_request') {
              prNumber = context.issue.number;
            } else {
              // push event — find any open PR for this branch.
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              if (prs.length === 0) return; // no open PR, nothing to comment on
              prNumber = prs[0].number;
            }

            if (!fs.existsSync('test-output.txt')) return; // tests didn't run
            const testOutput = fs.readFileSync('test-output.txt', 'utf8');
            const total     = '${{ steps.coverage.outputs.total }}';
            const threshold = '${{ steps.coverage.outputs.threshold }}';
            const passed    = '${{ steps.coverage.outputs.status }}' === 'pass';

            // Build per-package table from `go test` output lines like:
            // ok   github.com/RichardKnop/minisql/internal/minisql   9.7s   coverage: 70.1% of statements
            const rows = [];
            for (const line of testOutput.split('\n')) {
              const ok = line.match(/^ok\s+(\S+)\s+\S+\s+coverage:\s+(\S+)/);
              if (ok) { rows.push(`| \`${ok[1]}\` | ${ok[2]} |`); continue; }
              const fail = line.match(/^FAIL\s+(\S+)/);
              if (fail) rows.push(`| \`${fail[1]}\` | ❌ FAIL |`);
            }

            const table = rows.length
              ? ['| Package | Coverage |', '|---|---|', ...rows].join('\n')
              : '_No per-package data available._';

            const icon = passed ? '✅' : '❌';
            const body = [
              '## Code Coverage',
              '',
              `${icon} **Total: ${total}%** (threshold: ${threshold}%)`,
              '',
              table,
            ].join('\n');

            const marker = '## Code Coverage';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
